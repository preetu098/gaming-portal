<!DOCTYPE html>
<html>

<head>

<title>Games</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container py-5">

<h1 class="text-center text-light mb-5">

🎮 Available Games

</h1>

<div class="row">

{% for key,game in games.items() %}

<div class="col-md-4 mb-4">

<div class="card game-card text-center">

<div class="card-body">

<h1>

{{ game.icon }}

</h1>

<h3>

{{ game.title }}

</h3>

<p>

{{ game.description }}

</p>

<a href="/game/{{ key }}"
class="btn btn-warning">

Play Now

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
